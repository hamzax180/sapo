# ══════════════════════════════════════════════════════════════════
#  SAPO — Continuous Integration
#  Runs on every push and PR to main / dev branches.
#  Jobs:
#    1. lint         → ESLint (server) + secret scan
#    2. unit-tests   → Mocked unit tests (no DB needed)
#    3. smoke-tests  → Full stack with MongoDB in-memory
#    4. security     → npm audit + eval check
# ══════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, master, dev, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, master, dev, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Job 1 — Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run ESLint on server
        run: npx eslint . --ext .js --max-warnings 50 --ignore-pattern node_modules
        continue-on-error: true

      - name: Check for obvious secrets in source
        working-directory: .
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -rn \
            -e "password\s*=\s*['\"][^'\"]\{6,\}['\"]" \
            -e "secret\s*=\s*['\"][^'\"]\{8,\}['\"]" \
            --include="*.js" \
            --include="*.html" \
            --exclude-dir=node_modules \
            --exclude-dir=vendor \
            . || echo "✓ No obvious hardcoded secrets found"

  # ─────────────────────────────────────────────────────────────
  #  Job 2 — Unit Tests (no DB, fast)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run unit tests
        run: npm test
        env:
          PORT: "4099"
          JWT_SECRET: "ci-test-secret-key-xk39"
          GEMINI_API_KEY: ""

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log-${{ github.run_id }}
          path: server/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  #  Job 3 — Smoke / Integration Tests
  #  Uses a MongoDB Docker service — zero binary download, ~5s boot.
  # ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    # Spin up a real MongoDB instance as a sidecar container
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run smoke tests
        run: npm run smoke-test
        timeout-minutes: 5
        env:
          MONGODB_URI: mongodb://localhost:27017
          DB_NAME: merveks_sap_test
          PORT: "4099"
          JWT_SECRET: "ci-smoke-test-secret-xyz"
          GEMINI_API_KEY: ""


  # ─────────────────────────────────────────────────────────────
  #  Job 4 — Security Audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run npm audit (high/critical only)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerable patterns
        working-directory: .
        run: |
          echo "Checking eval() usage..."
          if grep -rn "eval(" --include="*.js" --exclude-dir=node_modules --exclude-dir=vendor .; then
            echo "⚠ eval() found — review carefully"
          else
            echo "✓ No eval() usage found"
          fi
