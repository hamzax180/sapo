# ══════════════════════════════════════════════════════════════════
#  MERVEKS SAP — Preview Deployments for Pull Requests
#  Creates a unique Vercel preview URL for every PR.
#  Posts the URL as a PR comment for easy review.
# ══════════════════════════════════════════════════════════════════
name: Preview Deploy

on:
  pull_request:
    branches: [main, master, dev, develop]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "20"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Run tests first
  # ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (PR gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm install --prefer-offline
      - run: npm test
        env:
          PORT: "4099"
          JWT_SECRET: "pr-preview-secret-abc"
          GEMINI_API_KEY: ""

  # ─────────────────────────────────────────────────────────────
  #  Deploy Preview to Vercel
  # ─────────────────────────────────────────────────────────────
  preview:
    name: 🔍 Preview Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: preview-deploy
        run: |
          URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview-url=$URL" >> $GITHUB_OUTPUT
          echo "🔍 Preview URL: $URL"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview-deploy.outputs.preview-url }}';
            const sha = context.sha.substring(0, 7);
            const body = [
              '## 🔍 Preview Deployment Ready',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | ${previewUrl} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Login** | \`admin@merveks.com\` / \`merveks2013\` |`,
              '',
              '> _This preview is automatically updated on every push to this PR._',
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
