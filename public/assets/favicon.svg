<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="wc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#081522"/>
    </linearGradient>
    <linearGradient id="wc-mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1aa6df"/>
      <stop offset="60%" stop-color="#18c8a8"/>
      <stop offset="100%" stop-color="#5cb12f"/>
    </linearGradient>
    <filter id="wc-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#wc-bg)"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#1aa6df" stroke-width="0.5" opacity="0.3"/>
  <!-- Cloud-W combined mark -->
  <g filter="url(#wc-glow)">
    <!-- Cloud body: three bumps forming top of W -->
    <circle cx="20" cy="27" r="7.5" fill="url(#wc-mark)"/>
    <circle cx="32" cy="23" r="9.5" fill="url(#wc-mark)"/>
    <circle cx="44" cy="27" r="7.5" fill="url(#wc-mark)"/>
    <!-- Cloud base fill -->
    <rect x="12.5" y="29" width="39" height="8" fill="url(#wc-mark)"/>
    <!-- W legs going down from cloud base -->
    <path d="M14 37 L20 50 L27 40 L32 50 L37 40 L44 50 L50 37 Z" fill="url(#wc-mark)"/>
    <!-- Dark cutout to carve the W interior out of cloud -->
    <path d="M20 20 L26 35 L32 25 L38 35 L44 20" fill="none" stroke="#081522" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- W valley highlights -->
    <circle cx="32" cy="23" r="3.5" fill="#0d2240" opacity="0.6"/>
  </g>
</svg>
