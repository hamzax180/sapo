<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1aa6df" />
  <title>WeboCloud — Operations Console</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/sap.css?v=28" />
</head>
<body>
  <!-- Brook-style preloader -->
  <div class="preloader" id="preloader">
    <div class="pl-inner">
      <div class="pl-ring"></div>
      <div class="pl-logo"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="ipl-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1aa6df"/><stop offset="100%" stop-color="#5cb12f"/></linearGradient></defs><circle cx="20" cy="27" r="7.5" fill="url(#ipl-grad)"/><circle cx="32" cy="23" r="9.5" fill="url(#ipl-grad)"/><circle cx="44" cy="27" r="7.5" fill="url(#ipl-grad)"/><rect x="12.5" y="29" width="39" height="8" fill="url(#ipl-grad)"/><path d="M14 37 L20 50 L27 40 L32 50 L37 40 L44 50 L50 37 Z" fill="url(#ipl-grad)"/></svg></div>
      <div class="pl-word" id="plWord">WEBOCLOUD</div>
    </div>
  </div>

  <div class="sb-backdrop" id="sbBackdrop"></div>

  <div class="app" id="app" hidden>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content" id="view"></main>
    </div>
  </div>

  <script src="js/config.js?v=28"></script>
  <script src="js/seed.js?v=28"></script>
  <script src="js/sample-data.js?v=28"></script>
  <script src="js/industries.js?v=28"></script>
  <script src="js/store.js?v=28"></script>
  <script src="js/ui.js?v=28"></script>
  <script src="js/charts.js?v=28"></script>
  <script src="js/ai.js?v=28"></script>
  <script src="js/workflow.js?v=28"></script>
  <script src="js/tour.js?v=28"></script>
  <script src="js/perf.js?v=28"></script>
  <script src="js/vendor/qrcode.min.js?v=28"></script>
  <script src="js/vendor/html5-qrcode.min.js?v=28"></script>
  <script src="js/views.js?v=28"></script>
  <script src="js/app.js?v=28"></script>
  <script>
    // safety net: never let the preloader get stuck
    setTimeout(function () { var p = document.getElementById("preloader"); if (p && !p.classList.contains("hide")) { p.classList.add("hide"); setTimeout(function () { p.remove(); }, 600); } }, 4000);
  </script>
</body>
</html>
